name = "Ó Bože"
description = "AI game prototype with chained LLM pipeline"
port = 8000

[scripts]
install = """
python3 -m venv venv
./venv/bin/pip install -r requirements.txt
cp config.example.yaml config.yaml
"""

start = "./venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT}"

update = "./venv/bin/pip install -r requirements.txt"

uninstall = ""

